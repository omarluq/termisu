name: Ameba
on:
  push:
    branches: [main]
    paths:
      - "src/**/*.cr"
      - "spec/**/*.cr"
      - ".ameba.yml"
      - ".github/workflows/ameba.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  ameba:
    name: Lint with Ameba
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Crystal
        uses: ./.github/actions/setup-crystal
      # Build and run the repo's own ameba (against the Crystal from
      # setup-crystal) instead of crystal-ameba/github-action: that action's
      # Docker image lags on an old Crystal whose formatter disagrees with ours,
      # breaking the Lint/Formatting rule. Building here keeps CI in lockstep
      # with local `bin/hace ameba`.
      - name: Build Ameba
        shell: bash
        run: shards build ameba
      - name: Run Ameba
        shell: bash
        run: bin/ameba
