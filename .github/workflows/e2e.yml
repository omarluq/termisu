name: E2E Tests
permissions:
  contents: read
on:
  push:
    branches: [main]
    paths:
      - "src/**/*.cr"
      - "examples/**/*.cr"
      - "spec/e2e/**"
      - "spec/termisu/testing/**"
      - "shard.yml"
      - "shard.lock"
      - "Hacefile.yml"
      - ".github/workflows/e2e.yml"
      - ".github/actions/setup-crystal/**"
  pull_request:
    branches: [main]
    paths:
      - "src/**/*.cr"
      - "examples/**/*.cr"
      - "spec/e2e/**"
      - "spec/termisu/testing/**"
      - "shard.yml"
      - "shard.lock"
      - "Hacefile.yml"
      - ".github/workflows/e2e.yml"
      - ".github/actions/setup-crystal/**"
  workflow_dispatch:
# The E2E suite is pure Crystal (Termisu::Testing): it drives the example
# binaries through a real PTY and asserts on the rendered screen. No
# node/bun/tui-test, so it runs identically on Linux, macOS, and FreeBSD.
# A Termisu app opens /dev/tty directly and sets its own raw mode, so the
# launching shell is irrelevant; the meaningful axis is the OS (termios /
# /dev/tty / terminfo), not the shell.
jobs:
  e2e:
    name: E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Crystal
        uses: ./.github/actions/setup-crystal
        with:
          crystal-version: "1.20.0"
      - name: Install shards
        run: shards install
      - name: Build hace
        run: shards build hace
      - name: Run E2E suite
        run: bin/hace e2e
  e2e-freebsd:
    name: E2E (FreeBSD 15.0)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Cache FreeBSD shards
        uses: actions/cache@v5
        with:
          path: lib
          key: freebsd-e2e-${{ hashFiles('shard.yml', 'shard.lock') }}
          restore-keys: |
            freebsd-e2e-
      - name: Run E2E in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "15.0"
          usesh: true
          prepare: |
            pkg install -y crystal shards terminfo-db
          run: |
            set -eux
            crystal --version
            shards --version
            shards install
            shards build hace
            bin/hace e2e
