name: Tests
on:
  push:
    branches: [main]
    paths:
      - "src/**/*.cr"
      - "spec/**/*.cr"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  test:
    name: Run Tests (Crystal ${{ matrix.crystal }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        crystal: ["1.17.0", "1.18.2", "1.19.1"]
    permissions:
      checks: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Crystal
        uses: ./.github/actions/setup-crystal
        with:
          crystal-version: ${{ matrix.crystal }}
      - name: Install expect (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y expect
      - name: Install expect (macOS)
        if: runner.os == 'macOS'
        run: brew install expect
      - name: Run tests
        run: unbuffer crystal spec -v
        env:
          TERM: xterm-256color
  test-freebsd:
    name: Run Tests (Crystal ${{ matrix.crystal }}, FreeBSD 15.0)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crystal: ["1.17.0", "1.18.2", "1.19.1"]
    permissions:
      checks: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Cache FreeBSD Crystal dependencies
        uses: actions/cache@v5
        with:
          path: |
            .cache/mise
            lib
          key: freebsd-test-${{ matrix.crystal }}-${{ hashFiles('shard.lock') }}
          restore-keys: |
            freebsd-test-${{ matrix.crystal }}-
            freebsd-test-
      - name: Run tests in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "15.0"
          usesh: true
          prepare: |
            pkg install -y curl git terminfo-db expect
          run: |
            set -eux
            export TERM=xterm-256color
            export MISE_DATA_DIR="$PWD/.cache/mise/data"
            export MISE_CACHE_DIR="$PWD/.cache/mise/cache"
            export MISE_CONFIG_DIR="$PWD/.cache/mise/config"
            mkdir -p "$MISE_DATA_DIR" "$MISE_CACHE_DIR" "$MISE_CONFIG_DIR"
            curl https://mise.run | sh
            export PATH="$HOME/.local/bin:$PATH"
            pwd
            ls
            which mise
            mise --version
            mise install crystal@${{ matrix.crystal }}
            mise exec crystal@${{ matrix.crystal }} -- crystal --version
            mise exec crystal@${{ matrix.crystal }} -- shards --version
            mise exec crystal@${{ matrix.crystal }} -- shards install
            mise exec crystal@${{ matrix.crystal }} -- unbuffer crystal spec -v
