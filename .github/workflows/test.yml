name: Tests
on:
  push:
    branches: [main]
    paths:
      - "src/**/*.cr"
      - "spec/**/*.cr"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  test:
    name: Run Tests (Crystal ${{ matrix.crystal }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        crystal: ["1.17.0", "1.18.2", "1.19.1", "1.20.0"]
    permissions:
      checks: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Crystal
        uses: ./.github/actions/setup-crystal
        with:
          crystal-version: ${{ matrix.crystal }}
      - name: Install expect (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y expect
      - name: Install expect (macOS)
        if: runner.os == 'macOS'
        run: brew install expect
      - name: Run tests
        run: unbuffer crystal spec spec/termisu_spec.cr spec/termisu -v
        env:
          TERM: xterm-256color
  test-freebsd:
    name: Run Tests (FreeBSD 15.0)
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Cache FreeBSD shards
        uses: actions/cache@v6
        with:
          path: lib
          key: freebsd-test-${{ hashFiles('shard.yml', 'shard.lock') }}
          restore-keys: |
            freebsd-test-
      - name: Run tests in FreeBSD VM
        uses: vmactions/freebsd-vm@4441bea20b31bfa77329a5af583199362489567e # v1.4.9
        with:
          release: "15.0"
          usesh: true
          prepare: |
            pkg install -y crystal shards terminfo-db
          run: |
            set -eux
            export TERM=xterm-256color
            crystal --version
            shards --version
            shards install
            script -q /dev/null crystal spec spec/termisu_spec.cr spec/termisu -v
